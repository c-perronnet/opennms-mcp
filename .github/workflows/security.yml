name: Security audit

on:
  push:
    branches: [main]
    paths:
      - package.json
      - package-lock.json
  pull_request:
    branches: [main]
    paths:
      - package.json
      - package-lock.json
  schedule:
    # Run every Monday at 08:00 UTC to catch newly disclosed vulnerabilities
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        # --audit-level=moderate fails the build for moderate, high, and critical issues
        # Remove the level flag or set to 'low' to be stricter
        run: npm audit --audit-level=moderate
